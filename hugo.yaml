baseURL: https://wang-jian-an.github.io/
defaultContentLanguage: en

module:
  imports:
    - path: github.com/hugo-toha/toha/v4

languages:
  en:
    params:
      locale: en
      label: English
      title: "Andy's Blog"
      weight: 1
  zh-tw:
    params:
      locale: zh-tw
      label: 繁體中文
      title: 王健安個人網頁
      weight: 2

params:
  # 確保這些路徑是相對於 /static/
  background: /images/site/background.jpg
  logo:
    main: /images/site/main-logo.png
    inverted: /images/site/inverted-logo.png
    favicon: /images/site/favicon.png

  gitRepo: https://github.com/Wang-Jian-An/Wang-Jian-An.github.io
  gitBranch: main

  features:
    theme:
      enable: true
      services:
        default: system
    portfolio:
      enable: true
    blog:
      enable: true
    notes:
      enable: true
    toc:
      enable: true
    copyCodeButton:
      enable: true